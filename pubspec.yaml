homepage: https://github.com/salahaldeenalmamary/flutter_context_provider

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.2
 

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^3.0.0
  flutter_lints: ^3.0.0
  test: ^1.24.0
  build_runner: ^2.4.0
  mockito: ^5.4.0